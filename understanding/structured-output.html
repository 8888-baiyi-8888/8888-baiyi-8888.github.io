      <h1>结构化输出为什么重要</h1>
      <p>结构化输出的核心目标，是让模型输出更容易被下游程序直接消费，而不是让人再手工整理一次。</p>
      <h2>一、为什么需要它</h2>
      <p>在自动化流程中，如果输出不稳定，后续校验、存储、执行、监控都会变得麻烦。</p>
      <h2>二、它通常怎么实现</h2>
      <p>常见做法是提示词约束 + 输出格式定义 + 下游验证。模型支持越好，开发成本越低。</p>
      <h2>三、为什么不同模型表现不同</h2>
      <p>因为不同厂商的提示模版、训练方式、工具接口和约束机制都不一样。</p>
