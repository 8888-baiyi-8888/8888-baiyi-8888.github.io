---
layout: default
---
<article class="doc-page">
  {% if page.title %}
  <header class="doc-header">
    {% if page.category_label %}<p class="eyebrow">{{ page.category_label }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="doc-description">{{ page.description }}</p>{% endif %}
  </header>
  {% endif %}
  <section class="doc-content markdown-body">
    {{ content }}
  </section>
</article>
