<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="brand">
        <a href="{{ '/' | relative_url }}">春和景明 · 个人文档</a>
        <p>记录研究、整理翻译、沉淀理解</p>
      </div>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">首页</a>
        <a href="{{ '/research/' | relative_url }}" class="{% if page.url contains '/research/' %}active{% endif %}">个人研究</a>
        <a href="{{ '/translation/' | relative_url }}" class="{% if page.url contains '/translation/' %}active{% endif %}">技术翻译</a>
        <a href="{{ '/understanding/' | relative_url }}" class="{% if page.url contains '/understanding/' %}active{% endif %}">技术理解</a>
        <a href="{{ '/about/' | relative_url }}" class="{% if page.url contains '/about/' %}active{% endif %}">关于</a>
      </nav>
    </header>

    <main class="page-wrap">
      {{ content }}
    </main>

    <footer class="footer">
      <p>© 2026 个人文档站 · Built for GitHub Pages / Jekyll</p>
    </footer>
  </div>
</body>
</html>
